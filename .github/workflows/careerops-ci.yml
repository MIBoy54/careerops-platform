name: CareerOps CI

on:
  push:
    branches:
      - develop
      - qa
      - demo
      - main
  pull_request:
    branches:
      - develop
      - qa
      - demo
      - main

jobs:
  quality-gate:
    name: Quality Gate - ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests (DEV Gate)
        run: npx vitest run tests/unit

      - name: Install Playwright Browsers
        if: github.event_name == 'pull_request' || github.ref_name == 'qa' || github.ref_name == 'demo' || github.ref_name == 'main'
        run: npx playwright install --with-deps

      - name: Start App
        if: github.event_name == 'pull_request' || github.ref_name == 'qa' || github.ref_name == 'demo' || github.ref_name == 'main'
        run: |
          APP_ENV=test DEMO_MODE=true CI=true npm start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Smoke Tests (QA Gate)
        if: github.event_name == 'pull_request' || github.ref_name == 'qa' || github.ref_name == 'demo' || github.ref_name == 'main'
        env:
          TEST_EMAIL: test@careerops.local
          TEST_PASSWORD: test-password
        run: npx playwright test tests/e2e/smoke --workers=1

      - name: Run E2E Tests (DEMO/LIVE Gate)
        if: github.ref_name == 'demo' || github.ref_name == 'main'
        env:
          TEST_EMAIL: test@careerops.local
          TEST_PASSWORD: test-password
        run: npx playwright test tests/e2e --workers=1 --grep-invert "Generated weekly report appears in Weekly Report History"
