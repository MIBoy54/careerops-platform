<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerOps Login</title>
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>CareerOps Platform</h1>
      <p class="login-subtitle">Sign in to continue</p>

<form action="/api/auth/login" method="POST">
  <div class="input-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>
  </div>

  <div class="input-group">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>
  </div>

<button id="loginBtn" type="submit">Login</button>

<button id="guestLogin" type="button" style="display:none; margin-top:10px; width:100%;">
  Continue as Guest
</button>
</form>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const isDemo = window.location.hostname === 'democareerops-platform.com';

  const loginBtn = document.getElementById('loginBtn');
  const guestBtn = document.getElementById('guestLogin');
  const emailGroup = document.getElementById('email')?.closest('.input-group');
  const passwordGroup = document.getElementById('password')?.closest('.input-group');

  if (isDemo) {
    if (loginBtn) loginBtn.style.display = 'none';
    if (emailGroup) emailGroup.style.display = 'none';
    if (passwordGroup) passwordGroup.style.display = 'none';
    if (guestBtn) guestBtn.style.display = 'block';
  }

  if (!guestBtn) {
    console.error('guestLogin button not found');
    return;
  }

  guestBtn.addEventListener('click', async () => {
    console.log('Guest login clicked');

    guestBtn.disabled = true;
    guestBtn.textContent = 'Logging in...';

    try {
      const formData = new URLSearchParams();
      formData.append('email', 'guest@careerops.com');
      formData.append('password', 'GuestCPSS2@26');

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: formData
      });

      console.log('Guest login status:', res.status);

      if (res.ok || res.redirected) {
        window.location.href = '/';
        return;
      }

      throw new Error('Guest login failed');
    } catch (err) {
      console.error(err);
      guestBtn.disabled = false;
      guestBtn.textContent = 'Continue as Guest';
      alert('Guest login failed');
    }
  });
});
</script>
