<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareerOps Weekly Report Validation</title>
    <link rel="stylesheet" href="./styles.css" />
<body>
  <div class="container">
    <h1>CareerOps Weekly Report Validation</h1>
    <p>Validate a weekly unemployment report before submission.</p>

    <form id="reportForm">
      <label for="week_start">Week Start</label>
      <input type="date" id="week_start" required />

      <label for="week_end">Week End</label>
      <input type="date" id="week_end" required />

      <label for="job_contacts">Number of Job Contacts</label>
      <input type="number" id="job_contacts" min="0" value="0" required />

      <button type="submit">Validate Report</button>
    </form>

    <div id="result" class="result hidden"></div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
